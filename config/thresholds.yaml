# Stock Screener Thresholds Configuration
# All numeric cutoffs are defined here — never hardcoded in source files.

growth:
  revenue_qoq_min_pct: 5.0        # Minimum QoQ revenue growth %
  revenue_yoy_min_pct: 10.0       # Minimum YoY revenue growth %
  pat_qoq_min_pct: 5.0            # Minimum QoQ PAT growth %
  pat_yoy_min_pct: 10.0           # Minimum YoY PAT growth %
  eps_yoy_min_pct: 10.0           # Minimum YoY EPS growth %

profitability:
  ebitda_margin_min_pct: 10.0     # Minimum EBITDA margin %
  roe_min_pct: 15.0               # Minimum Return on Equity %
  roce_min_pct: 12.0              # Minimum Return on Capital Employed %
  ocf_pat_ratio_min: 0.75         # Minimum OCF/PAT ratio (cash quality check)

debt:
  de_ratio_max: 1.0               # Maximum Debt/Equity ratio
  de_ratio_red: 2.0               # Red flag Debt/Equity ratio
  interest_coverage_min: 3.0      # Minimum Interest Coverage ratio
  interest_coverage_red: 1.5      # Red flag Interest Coverage ratio
  net_debt_ebitda_max: 3.0        # Maximum Net Debt/EBITDA

valuation:
  pe_max: 40.0                    # Maximum P/E ratio (above = expensive)
  pe_red: 60.0                    # Red flag P/E ratio
  pb_max: 5.0                     # Maximum P/B ratio
  ev_ebitda_max: 20.0             # Maximum EV/EBITDA ratio
  peg_max: 1.5                    # Maximum PEG ratio

shareholding:
  promoter_min_pct: 35.0          # Minimum promoter holding %
  promoter_pledge_max_pct: 10.0   # Maximum promoter pledge %
  promoter_pledge_red_pct: 25.0   # Red flag promoter pledge %
  promoter_pledge_increase_alert: 5.0  # Alert if pledge increases by this % QoQ
  promoter_holding_decrease_alert: 2.0 # Alert if promoter selling by this % over 6Q
  fii_increase_min_pct: 1.0       # Bullish signal: FII net bought this much over 6Q (pp)
  public_holding_max_pct: 30.0    # Public holding above this = weak institutional conviction (-5 pts)
  public_6q_increase_alert: 2.0   # Public 6Q increase above this = retail accumulating while institutions exit (-3 pts)
  dii_increase_min_pct: 1.0       # Signal threshold for DII buying over 6Q (pp)

working_capital:
  debtor_days_max: 90             # Maximum debtor days
  inventory_days_max: 120         # Maximum inventory days
  debtor_days_increase_alert: 30  # Alert if debtor days increased by this

financial_sector:
  # NBFCs, banks, HFCs, insurance — lending IS operations, so negative OCF is normal
  de_ratio_max: 5.0               # Normal leverage for NBFCs/HFCs
  de_ratio_red: 8.0               # Red flag leverage
  ocf_checks_applicable: false    # OCF/PAT ratio and FCF checks are not meaningful
  gross_npa_green_pct: 3.0        # Gross NPA below this = healthy
  gross_npa_red_pct: 7.0          # Gross NPA above this = red flag
  net_npa_green_pct: 1.0          # Net NPA below this = well provisioned
  net_npa_red_pct: 3.0            # Net NPA above this = red flag

real_estate:
  # Pre-sales coverage = Customer Advances / Borrowings
  presales_coverage_green: 0.75    # Advances > 75% of borrowings = mostly customer funded
  presales_coverage_red: 0.25      # Advances < 25% of borrowings = debt-heavy
  # Net debt after advances = (Borrowings - Cash - Advances) / Equity
  net_debt_post_advances_max: 0.5  # < 0.5x = healthy after netting customer money
  net_debt_post_advances_red: 1.5  # > 1.5x = over-leveraged even after netting
  # Receivables aging = Over-6m receivables / Total receivables
  receivables_aging_green: 0.30    # < 30% overdue = healthy collection
  receivables_aging_red: 0.65      # > 65% overdue = poor collection
  # Inventory / Annual Revenue (years of inventory on hand)
  inventory_years_green: 3.0       # < 3 years = good velocity
  inventory_years_red: 6.0         # > 6 years = slow-moving land bank

contingent_liabilities:
  net_worth_ratio_max: 0.5        # Contingent liabilities > 50% net worth = RED

cache:
  ttl_hours: 24                   # Cache time-to-live in hours
  dir: data/cache                 # Cache directory (relative to project root)

scoring:
  # Per-factor weights — each entry has `weight` (max pts at default) and `enabled` (bool).
  # Increase a weight to make a factor matter more; set enabled: false to skip it entirely.
  # Defaults reflect the original scoring design; the web UI lets users customise per profile.
  factors:
    # weight       — current max pts (users can override this for custom scoring)
    # default_weight — calibration base; raw values in code are scaled to this. Do not change.
    # ─── BasicScreener ────────────────────────────────────────────────────────
    revenue_growth:
      weight: 15
      default_weight: 15
      enabled: true
    pat_growth:
      weight: 15
      default_weight: 15
      enabled: true
    ebitda_margin:
      weight: 10      # margin level; trend adds ±50% of weight
      default_weight: 10
      enabled: true
    ocf_quality:
      weight: 15      # OCF/PAT (or OCF/EBITDA for lease-heavy)
      default_weight: 15
      enabled: true
    npa_quality:
      weight: 15      # financial sector only — replaces ebitda_margin + ocf_quality
      default_weight: 15
      enabled: true
    # ─── AdvancedScreener ─────────────────────────────────────────────────────
    roe:
      weight: 10
      default_weight: 10
      enabled: true
    roce:
      weight: 8
      default_weight: 8
      enabled: true
    de_ratio:
      weight: 12
      default_weight: 12
      enabled: true
    interest_coverage:
      weight: 6
      default_weight: 6
      enabled: true
    fcf:
      weight: 5
      default_weight: 5
      enabled: true
    peg_ratio:
      weight: 8
      default_weight: 8
      enabled: true
    historical_pe:
      weight: 8
      default_weight: 8
      enabled: true
    promoter_pledge:
      weight: 10
      default_weight: 10
      enabled: true
    promoter_holding:
      weight: 8
      default_weight: 8
      enabled: true
    fii_activity:
      weight: 6       # combined FII+DII selling adds extra -10
      default_weight: 6
      enabled: true
    dii_activity:
      weight: 6
      default_weight: 6
      enabled: true
    working_capital:
      weight: 5       # debtor-days and CCC trend
      default_weight: 5
      enabled: true
    red_flag_penalty:
      weight: 5       # points subtracted per RED flag (for flags not already numerically scored)
      default_weight: 5
      enabled: true
